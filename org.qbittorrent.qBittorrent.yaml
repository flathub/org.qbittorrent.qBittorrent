app-id: org.qbittorrent.qBittorrent
runtime: org.kde.Platform
sdk: org.kde.Sdk
runtime-version: 6.7
command: qbittorrent-nox
rename-icon: qbittorrent
copy-icon: true
finish-args:
  - --filesystem=host
  - --share=network
  - --system-talk-name=org.freedesktop.login1
  - --system-talk-name=org.freedesktop.UPower
cleanup:
  - /include
  - /lib/*.a
  - /lib/*.la
  - /lib/cmake
  - /lib/pkgconfig
  - /share/cmake
  - /share/man

modules:
  - name: boost
    buildsystem: simple
    build-commands:
      - ./bootstrap.sh --prefix=/app
      - ./b2 install --with-headers cxxflags="$CXXFLAGS" linkflags="$LDFLAGS" -j $FLATPAK_BUILDER_N_JOBS
    sources:
      - type: archive
        url: https://archives.boost.io/release/1.86.0/source/boost_1_86_0.tar.gz
        sha256: 2575e74ffc3ef1cd0babac2c1ee8bdb5782a0ee672b1912da40e5b4b591ca01f
        #x-checker-data:
        #  type: html
        #  url: https://www.boost.org/feed/downloads.rss
        #  version-pattern: <item><title>Version ([\d\.]+)<\/title>
        #  url-template: https://archives.boost.io/release/${version}/source/boost_${major}_${minor}_${patch}.tar.gz

  - name: libtorrent
    buildsystem: cmake-ninja
    builddir: true
    config-opts:
      - -DBUILD_SHARED_LIBS=OFF
      - -DCMAKE_BUILD_TYPE=RelWithDebInfo
      - -DCMAKE_CXX_STANDARD=20
      - -DCMAKE_INTERPROCEDURAL_OPTIMIZATION=ON
      - -Ddeprecated-functions=OFF
    sources:
      - type: git
        url: https://github.com/arvidn/libtorrent.git  # branch RC_1_2
        commit: 68ec0785cd069de47baf3ea9fed27f7c32f1c974
        x-checker-data:
          type: json
          url: https://api.github.com/repos/arvidn/libtorrent/branches/RC_1_2
          commit-query: .commit.sha

  - name: qbittorrent-nox
    buildsystem: cmake-ninja
    builddir: true
    config-opts:
      - -DCMAKE_BUILD_TYPE=RelWithDebInfo
      - -DCMAKE_INTERPROCEDURAL_OPTIMIZATION=ON
      - -DGUI=OFF
    sources:
      - type: archive
        url: https://github.com/qbittorrent/qBittorrent/archive/refs/tags/release-5.0.4.tar.gz
        sha256: 6c1077e51be2189189c4a0ec99402ccc88a4f43d88d8dece721cbe508460dd4b
        x-checker-data:
          type: json
          url: https://api.github.com/repos/qbittorrent/qBittorrent/tags
          version-query: map(.name | select(test("^release-[\\d\\.]+$"))) | first
            | sub("^release-"; "")
          url-query: '"https://github.com/qbittorrent/qBittorrent/archive/refs/tags/release-"
            + $version + ".tar.gz"'

  - name: qbittorrent-nox specifics
    buildsystem: simple
    build-commands:
      - install -Dm644 qbittorrent.desktop $FLATPAK_DEST/share/applications/$FLATPAK_ID.desktop
      - install -Dm644 qbittorrent.metainfo.xml $FLATPAK_DEST/share/metainfo/$FLATPAK_ID.metainfo.xml
      - install -Dm644 qbittorrent.png -t $FLATPAK_DEST/share/icons/hicolor/128x128/apps
      - install -Dm644 qbittorrent.svg -t $FLATPAK_DEST/share/icons/hicolor/scalable/apps
    sources:
      - type: file
        path: qbittorrent.desktop
      - type: file
        path: qbittorrent.metainfo.xml
      - type: file
        url: https://raw.githubusercontent.com/qbittorrent/qBittorrent/master/dist/unix/menuicons/128x128/apps/qbittorrent.png
        sha256: 0526d31b635e7b1f4748bb0e6a660b30b4d885a50e8c3f60ea9e5caf5b2c50b8
      - type: file
        url: https://raw.githubusercontent.com/qbittorrent/qBittorrent/master/dist/unix/menuicons/scalable/apps/qbittorrent.svg
        sha256: 1930d0ce62e017f677d39150ee5b8746600938c5be27d75a326d631cc87a535b
